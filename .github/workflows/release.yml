name: Release

on:
  workflow_dispatch:
    inputs:
      include_arm64:
        description: "Also build the optional arm64 Linux artifact"
        required: false
        default: false
        type: boolean
  push:
    tags:
      - "v*"

env:
  SCCACHE_GHA_ENABLED: "true"
  RUSTC_WRAPPER: "sccache"

jobs:
  build-linux-x86_64:
    runs-on: ubuntu-22.04
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - name: Setup sccache
        uses: mozilla-actions/sccache-action@v0.0.9

      - name: Cache Rust dependencies
        uses: useblacksmith/rust-cache@v3
        with:
          shared-key: cdsync-${{ runner.os }}-${{ runner.arch }}-cargo
          cache-targets: true
          cache-all-crates: true
          save-if: ${{ github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/tags/v') }}

      - name: Build release binary
        run: cargo build --locked --release

      - name: Package release artifact
        run: bash scripts/package-release.sh x86_64-unknown-linux-gnu target/release/cdsync dist

      - name: Upload release artifact
        uses: actions/upload-artifact@v4
        with:
          name: cdsync-linux-x86_64
          path: |
            dist/*.tar.gz
            dist/*.sha256

      - name: Show sccache stats
        if: always()
        run: sccache --show-stats || true

  build-linux-arm64:
    if: github.event_name == 'workflow_dispatch' && inputs.include_arm64
    runs-on: ubuntu-22.04-arm
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - name: Setup sccache
        uses: mozilla-actions/sccache-action@v0.0.9

      - name: Cache Rust dependencies
        uses: useblacksmith/rust-cache@v3
        with:
          shared-key: cdsync-${{ runner.os }}-${{ runner.arch }}-cargo
          cache-targets: true
          cache-all-crates: true
          save-if: ${{ github.event_name == 'workflow_dispatch' }}

      - name: Build release binary
        run: cargo build --locked --release

      - name: Package release artifact
        run: bash scripts/package-release.sh aarch64-unknown-linux-gnu target/release/cdsync dist

      - name: Upload release artifact
        uses: actions/upload-artifact@v4
        with:
          name: cdsync-linux-arm64
          path: |
            dist/*.tar.gz
            dist/*.sha256

      - name: Show sccache stats
        if: always()
        run: sccache --show-stats || true

  publish-github-release:
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-22.04
    needs:
      - build-linux-x86_64
    permissions:
      contents: write
    steps:
      - name: Download packaged artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: cdsync-linux-x86_64
          path: dist
          merge-multiple: true

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.tar.gz
            dist/*.sha256
          generate_release_notes: true

name: CI

on:
  pull_request:
  push:
    branches:
      - master

env:
  SCCACHE_GHA_ENABLED: "true"
  RUSTC_WRAPPER: "sccache"

jobs:
  fmt:
    runs-on: ubuntu-22.04
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.94.0
          components: rustfmt, clippy
      - name: Setup sccache
        uses: mozilla-actions/sccache-action@v0.0.9
      - name: Cache Rust dependencies
        uses: useblacksmith/rust-cache@v3
        with:
          shared-key: cdsync-${{ runner.os }}-${{ runner.arch }}-cargo
          cache-targets: true
          cache-all-crates: true
          save-if: ${{ github.ref == 'refs/heads/master' }}
      - name: Check formatting
        run: cargo fmt --all --check
      - name: Show sccache stats
        if: always()
        run: sccache --show-stats || true

  clippy:
    runs-on: ubuntu-22.04
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.94.0
          components: rustfmt, clippy
      - name: Setup sccache
        uses: mozilla-actions/sccache-action@v0.0.9
      - name: Cache Rust dependencies
        uses: useblacksmith/rust-cache@v3
        with:
          shared-key: cdsync-${{ runner.os }}-${{ runner.arch }}-cargo
          cache-targets: true
          cache-all-crates: true
          save-if: ${{ github.ref == 'refs/heads/master' }}
      - name: Lint
        run: cargo clippy --all-targets --all-features -- -D warnings
      - name: Show sccache stats
        if: always()
        run: sccache --show-stats || true

  test:
    runs-on: ubuntu-22.04
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.94.0
          components: rustfmt, clippy
      - name: Setup sccache
        uses: mozilla-actions/sccache-action@v0.0.9
      - name: Cache Rust dependencies
        uses: useblacksmith/rust-cache@v3
        with:
          shared-key: cdsync-${{ runner.os }}-${{ runner.arch }}-cargo
          cache-targets: true
          cache-all-crates: true
          save-if: ${{ github.ref == 'refs/heads/master' }}
      - name: Unit and non-ignored integration tests
        run: cargo test
      - name: Show sccache stats
        if: always()
        run: sccache --show-stats || true

  e2e:
    runs-on: ubuntu-22.04
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.94.0
          components: rustfmt, clippy
      - name: Setup sccache
        uses: mozilla-actions/sccache-action@v0.0.9
      - name: Cache Rust dependencies
        uses: useblacksmith/rust-cache@v3
        with:
          shared-key: cdsync-${{ runner.os }}-${{ runner.arch }}-cargo
          cache-targets: true
          cache-all-crates: true
          save-if: ${{ github.ref == 'refs/heads/master' }}
      - name: Install postgres client
        run: sudo apt-get update && sudo apt-get install -y postgresql-client
      - name: Start emulator services
        run: docker compose -f docker-compose.e2e.yml --profile itest up -d bigquery-emulator postgres
      - name: Wait for services
        run: |
          until pg_isready -h localhost -p 5433 -U cdsync -d cdsync; do sleep 1; done
          until curl -sf http://localhost:9050/projects >/dev/null; do sleep 1; done
      - name: Run end-to-end tests
        env:
          CDSYNC_E2E_PG_URL: postgres://cdsync:cdsync@localhost:5433/cdsync
          CDSYNC_E2E_BQ_HTTP: http://localhost:9050
          CDSYNC_E2E_BQ_GRPC: localhost:9051
          CDSYNC_E2E_BQ_PROJECT: cdsync
          CDSYNC_E2E_BQ_DATASET: cdsync_e2e
        run: |
          cargo test --test e2e_postgres_bigquery -- --ignored --nocapture
          cargo test --test e2e_postgres_cdc -- --ignored --nocapture
          cargo test --test e2e_postgres_schema_changes -- --ignored --nocapture
          cargo test --test e2e_postgres_soft_deletes -- --ignored --nocapture
          cargo test --test e2e_runner_graceful_shutdown -- --ignored --nocapture
      - name: Stop emulator services
        if: always()
        run: docker compose -f docker-compose.e2e.yml --profile itest down -v
      - name: Show sccache stats
        if: always()
        run: sccache --show-stats || true
